name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint, build and test
    runs-on: ubuntu-latest

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: '5432'
      DATABASE_USER: ovgs
      DATABASE_PASSWORD: ovgs
      DATABASE_NAME: ovgs
      JWT_SECRET: ci-insecure-secret-change-me

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ovgs
          POSTGRES_PASSWORD: ovgs
          POSTGRES_DB: ovgs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ovgs -d ovgs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests (coverage gate)
        run: npm run test:cov

      - name: E2E tests
        run: npm run test:e2e

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ovgs-api:ci .
