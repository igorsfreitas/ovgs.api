services:
  postgres:
    image: postgres:16-alpine
    container_name: ovgs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-ovgs}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-ovgs}
      POSTGRES_DB: ${DATABASE_NAME:-ovgs}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - ovgs-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-ovgs} -d ${DATABASE_NAME:-ovgs}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ovgs-api
    restart: unless-stopped
    env_file: .env
    environment:
      # Dentro da rede do compose o banco é acessível pelo nome do serviço.
      DATABASE_HOST: postgres
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ovgs-pgdata:
